<!DOCTYPE html>
<html>
<head>
    <title>Aptitude Tracker</title>
    <link rel="stylesheet" href="aptitude.css">
</head>
<body>

    <div class="container">

        <h1>Aptitude Tracker</h1>

        <div class="add">

            <input type="text"
                   id="topic"
                   placeholder="Topic Name">

            <input type="number"
                   id="questions"
                   placeholder="Questions Solved">

            <button onclick="addAptitude()">
                Add
            </button>

        </div>

        <ul id="aptitudeList"></ul>

    </div>

    <script src="aptitude.js"></script>

</body>
</html>
